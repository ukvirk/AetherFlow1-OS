<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherFlow OS | Elite Edition</title>
    <!-- ELITE TOOLKIT: CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-slate-950 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useReducer } = React;
        
        // ELITE TRICK: Mapping Lucide Globals for JSX compatibility
        const { 
            Clock, Plus, Trash2, Check, Moon, Sun, Target, Calendar, Flame, Trophy, 
            PlayCircle, PauseCircle, SkipForward, Award, CheckCircle2, BarChart3, 
            Smile, Meh, Frown, Coffee, CloudRain, Wind, Volume2, Users, Copy, 
            Sparkles, X, BookOpen, Save, Settings, CheckSquare, Heart, TrendingUp, 
            RefreshCw, Zap, CheckCircle 
        } = lucide;

        // --- REDUCERS ---
        const taskReducer = (state, action) => {
            switch (action.type) {
                case 'SET_TASKS': return action.payload;
                case 'ADD_TASK': return [...state, action.payload];
                case 'TOGGLE_TASK': return state.map(t => t.id === action.payload ? { ...t, completed: !t.completed } : t);
                case 'DELETE_TASK': return state.filter(t => t.id !== action.payload);
                default: return state;
            }
        };

        const habitReducer = (state, action) => {
            switch (action.type) {
                case 'SET_HABITS': return action.payload;
                case 'ADD_HABIT': return [...state, action.payload];
                case 'TOGGLE_HABIT': return state.map(h => h.id === action.payload ? { ...h, completedToday: !h.completedToday, totalCompletions: h.completedToday ? h.totalCompletions - 1 : h.totalCompletions + 1 } : h);
                case 'DELETE_HABIT': return state.filter(h => h.id !== action.payload);
                default: return state;
            }
        };

        // --- SUB-COMPONENTS ---
        const FreeForeverBanner = () => (
            <div className="fixed top-0 left-0 right-0 z-50 bg-gradient-to-r from-emerald-400 via-blue-500 to-indigo-600 py-2 px-4 text-center shadow-2xl">
                <p className="text-white font-bold text-[10px] md:text-xs flex items-center justify-center gap-2 uppercase tracking-widest">
                    <Sparkles className="w-3 h-3 animate-spin" />
                    AetherFlow Elite: 100% Free Forever
                    <Sparkles className="w-3 h-3 animate-spin" />
                </p>
            </div>
        );

        const Modal = ({ title, children, onClose, isDarkMode }) => (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
                <div className={`rounded-3xl shadow-2xl w-full max-w-md p-8 border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200 text-slate-900'}`}>
                    <div className="flex justify-between items-center mb-6">
                        <h3 className="text-2xl font-black italic">{title}</h3>
                        <button onClick={onClose}><X className="w-6 h-6 hover:rotate-90 transition-transform" /></button>
                    </div>
                    {children}
                </div>
            </div>
        );

        const TaskItem = ({ task, toggleTask, deleteTask, isDarkMode }) => (
            <div className={`flex items-center justify-between p-4 mb-3 rounded-2xl border-l-4 transition-all duration-300 ${task.completed ? 'bg-emerald-500/10 border-emerald-500 opacity-60' : 'bg-slate-800/40 border-slate-600 hover:scale-[1.02]'}`}>
                <div className="flex items-center gap-4">
                    <button onClick={() => toggleTask(task.id)} className={`p-2 rounded-full ${task.completed ? 'bg-emerald-500' : 'bg-slate-700'}`}><Check className="w-4 h-4" /></button>
                    <div>
                        <span className={`block font-bold ${task.completed ? 'line-through text-slate-500' : ''}`}>{task.text}</span>
                        <span className="text-[10px] text-slate-500 uppercase font-black tracking-tighter">{task.priority} Priority</span>
                    </div>
                </div>
                <button onClick={() => deleteTask(task.id)}><Trash2 className="w-4 h-4 text-red-500/50 hover:text-red-500" /></button>
            </div>
        );

        const HabitItem = ({ habit, toggleHabit, deleteHabit }) => (
            <div className={`flex items-center justify-between p-4 mb-3 rounded-2xl glass ${habit.completedToday ? 'border-indigo-500' : 'border-slate-800'}`}>
                <div className="flex items-center gap-4">
                    <div className="text-2xl">{habit.icon}</div>
                    <div>
                        <span className="font-bold block">{habit.name}</span>
                        <span className="text-[10px] text-indigo-400 font-bold uppercase">Streak: {habit.totalCompletions}</span>
                    </div>
                </div>
                <button onClick={() => toggleHabit(habit.id)} className={`px-4 py-2 rounded-xl font-black text-xs transition-all ${habit.completedToday ? 'bg-indigo-600 shadow-[0_0_15px_rgba(79,70,229,0.5)]' : 'bg-slate-700'}`}>
                    {habit.completedToday ? 'DONE' : 'EXECUTE'}
                </button>
            </div>
        );

        // --- MAIN APP ---
        const AetherFlowApp = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [tasks, dispatchTasks] = useReducer(taskReducer, []);
            const [habits, dispatchHabits] = useReducer(habitReducer, []);
            const [points, setPoints] = useState(245);
            const [streak, setStreak] = useState(7);
            const [newTask, setNewTask] = useState('');
            
            // Pomodoro State
            const [timeLeft, setTimeLeft] = useState(25 * 60);
            const [isActive, setIsActive] = useState(false);

            useEffect(() => {
                let timer = null;
                if (isActive && timeLeft > 0) {
                    timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0) {
                    setIsActive(false);
                    setPoints(p => p + 50);
                    alert("Focus Protocol Complete. +50 Points.");
                }
                return () => clearInterval(timer);
            }, [isActive, timeLeft]);

            const renderScreen = () => {
                if (activeTab === 'dashboard') return (
                    <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
                        <div className="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] text-center shadow-2xl">
                            <h2 className="text-slate-500 text-[10px] font-black tracking-[0.3em] mb-4 uppercase">System Performance</h2>
                            <div className="text-7xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-600">{points}</div>
                            <p className="text-indigo-400 font-bold text-sm mt-2">Aether Points Earned</p>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="glass p-6 rounded-3xl flex flex-col items-center">
                                <Flame className="text-orange-500 w-8 h-8 mb-2" />
                                <span className="font-black text-2xl">{streak} Days</span>
                            </div>
                            <div className="glass p-6 rounded-3xl flex flex-col items-center">
                                <Trophy className="text-yellow-500 w-8 h-8 mb-2" />
                                <span className="font-black text-2xl">Elite Rank</span>
                            </div>
                        </div>
                    </div>
                );
                
                if (activeTab === 'tasks') return (
                    <div className="space-y-4 animate-in fade-in duration-500">
                        <h2 className="text-3xl font-black italic">Focus Protocol</h2>
                        <div className="flex gap-2 mb-6">
                            <input value={newTask} onChange={e => setNewTask(e.target.value)} placeholder="Define objective..." className="flex-1 bg-slate-900 border border-slate-800 rounded-2xl px-6 py-4 outline-none focus:border-indigo-500 transition-all" />
                            <button onClick={() => { if(newTask){ dispatchTasks({type:'ADD_TASK', payload:{id:Date.now(), text:newTask, completed:false, priority:'high'}}); setNewTask(''); } }} className="bg-white text-black px-6 rounded-2xl font-black"><Plus /></button>
                        </div>
                        {tasks.map(t => <TaskItem key={t.id} task={t} toggleTask={id => dispatchTasks({type:'TOGGLE_TASK', payload:id})} deleteTask={id => dispatchTasks({type:'DELETE_TASK', payload:id})} />)}
                    </div>
                );

                if (activeTab === 'focus') return (
                    <div className="flex flex-col items-center justify-center pt-10 space-y-12">
                        <div className="relative">
                            <div className="w-64 h-64 rounded-full border-8 border-slate-900 flex flex-col items-center justify-center shadow-[0_0_50px_rgba(79,70,229,0.2)]">
                                <span className="text-6xl font-black tabular-nums">{Math.floor(timeLeft / 60)}:{String(timeLeft % 60).padStart(2, '0')}</span>
                                <span className="text-[10px] text-slate-500 font-black tracking-widest mt-2">DEEP WORK ACTIVE</span>
                            </div>
                        </div>
                        <div className="flex gap-6">
                            <button onClick={() => setIsActive(!isActive)} className="bg-indigo-600 text-white px-12 py-4 rounded-full font-black shadow-lg shadow-indigo-500/40 hover:scale-105 active:scale-95 transition-all uppercase tracking-widest">
                                {isActive ? 'Pause' : 'Initialize'}
                            </button>
                            <button onClick={() => {setIsActive(false); setTimeLeft(25*60);}} className="bg-slate-800 p-4 rounded-full"><RefreshCw /></button>
                        </div>
                    </div>
                );

                if (activeTab === 'habits') return (
                    <div className="space-y-4">
                        <h2 className="text-3xl font-black italic">Neural Wiring</h2>
                        {habits.length === 0 && (
                            <button onClick={() => dispatchHabits({type:'ADD_HABIT', payload:{id:1, name:'Deep Reading', icon:'📚', totalCompletions:12, completedToday:false}})} className="w-full border-2 border-dashed border-slate-800 p-10 rounded-[2rem] text-slate-600 font-bold hover:border-indigo-500 transition-colors">
                                + Load Recommended Habits
                            </button>
                        )}
                        {habits.map(h => <HabitItem key={h.id} habit={h} toggleHabit={id => dispatchHabits({type:'TOGGLE_HABIT', payload:id})} />)}
                    </div>
                );
            };

            return (
                <div className="min-h-screen max-w-lg mx-auto px-6 pt-20 pb-32 relative">
                    <FreeForeverBanner />
                    {renderScreen()}
                    
                    <nav className="fixed bottom-6 left-6 right-6 max-w-lg mx-auto glass rounded-[2.5rem] flex justify-around p-3 z-50">
                        {[
                            { id: 'dashboard', icon: Calendar },
                            { id: 'tasks', icon: Target },
                            { id: 'focus', icon: Clock },
                            { id: 'habits', icon: Heart }
                        ].map(tab => {
                            const Icon = tab.icon;
                            return (
                                <button 
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`p-4 rounded-full transition-all duration-500 ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-lg scale-110' : 'text-slate-500 hover:text-white'}`}
                                >
                                    <Icon className="w-6 h-6" />
                                </button>
                            );
                        })}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AetherFlowApp />);
    </script>
</body>
</html>
